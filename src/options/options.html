<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - Tab Bookmark Saver</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>设置 ⚙️</h1>
      <button id="backToNewTab" class="back-link">← 返回新标签页</button>
    </header>

    <div id="setupBanner" class="setup-banner hidden">
      <span class="setup-banner-icon">⚠️</span>
      <div class="setup-banner-content">
        <strong>尚未设置工作区</strong>
        <p>请在下方创建一个新的工作区，或选择一个已有文件夹。</p>
      </div>
    </div>

    <main class="main">
      <section class="section">
        <div class="section-header-with-status">
          <h2>工作区设置</h2>
          <div class="workspace-status">
            <span class="status-hint">当前抽屉 🗃️ </span>
            <span class="workspace-name" id="currentWorkspaceName"></span>
          </div>
        </div>

        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label" for="newWorkspaceName">创建工作区</label>
            <p class="setting-desc">新建一个书签文件夹，并自动将其设为当前工作区</p>
          </div>
          <div class="setting-control">
            <div class="input-group">
              <input type="text" id="newWorkspaceName" placeholder="例如：我的工作区">
              <button id="createWorkspace" class="btn btn-secondary">创建</button>
            </div>
          </div>
        </div>

        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label">选择工作区</label>
            <p class="setting-desc">从已有书签文件夹中选择一个作为工作区，保存的标签页将存放在这里</p>
          </div>
          <div class="setting-control">
            <button id="selectWorkspace" class="btn btn-primary">选择文件夹</button>
          </div>
        </div>

      </section>

      <section class="section">
        <h2>外观设置</h2>

        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label">关闭顶栏书签栏</label>
            <p class="setting-desc">隐藏新标签页顶部的 Chrome 书签栏</p>
          </div>
          <div class="setting-control">
            <label class="toggle">
              <input type="checkbox" id="hideBookmarkBar">
              <span class="toggle-slider"></span>
            </label>
            <span class="custom-indicator" title="用户偏好">*</span>
          </div>
        </div>

        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label">标题自动换行</label>
            <p class="setting-desc">开启后，长标题会自动换行显示；关闭则显示省略号</p>
          </div>
          <div class="setting-control">
            <label class="toggle">
              <input type="checkbox" id="wrapTitleText">
              <span class="toggle-slider"></span>
            </label>
            <span class="custom-indicator" title="用户偏好">*</span>
          </div>
        </div>

        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label">以标签组形式打开</label>
            <p class="setting-desc">开启后，点击工作区书签文件夹将以标签组形式打开所有标签页</p>
          </div>
          <div class="setting-control">
            <label class="toggle">
              <input type="checkbox" id="openAsTabGroup">
              <span class="toggle-slider"></span>
            </label>
            <span class="custom-indicator" title="用户偏好">*</span>
          </div>
        </div>

        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label">关闭打开单个链接时的页面动画效果</label>
            <p class="setting-desc">关闭后，等待页面转跳时不播放闭幕动画</p>
          </div>
          <div class="setting-control">
            <label class="toggle">
              <input type="checkbox" id="disableOpenAnimation">
              <span class="toggle-slider"></span>
            </label>
            <span class="custom-indicator" title="用户偏好">*</span>
          </div>
        </div>
      </section>

      <section class="section danger-zone">
        <h2>⚠️ 危险区域</h2>

        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label">清空工作区</label>
            <p class="setting-desc">删除工作区中的所有书签文件夹（此操作不可撤销）</p>
          </div>
          <div class="setting-control">
            <button id="clearWorkspace" class="btn btn-danger">清空</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <span id="extensionVersion"></span>
    </footer>

    <div id="toast" class="toast"></div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
