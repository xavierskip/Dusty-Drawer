<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - Tab Bookmark Saver</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>⚙️ 设置</h1>
      <button id="backToNewTab" class="back-link">← 返回新标签页</button>
    </header>

    <main class="main">
      <section class="section">
        <h2>工作区设置</h2>
        
        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label">新建工作区</label>
            <p class="setting-desc">创建一个新的书签文件夹作为工作区</p>
          </div>
          <div class="setting-control">
            <div class="input-group">
              <input type="text" id="newWorkspaceName" placeholder="工作区名称">
              <button id="createWorkspace" class="btn btn-secondary">创建</button>
            </div>
          </div>
        </div>
        
        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label">当前工作区文件夹</label>
            <p class="setting-desc">选择一个书签文件夹作为工作区，所有保存的标签页将被存储在这里</p>
          </div>
          <div class="setting-control">
            <div id="currentWorkspace" class="workspace-display">
              <span class="workspace-name">未设置</span>
              <button id="selectWorkspace" class="btn btn-primary">选择文件夹</button>
            </div>
          </div>
        </div>

      </section>

      <section class="section">
        <h2>外观设置</h2>

        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label">显示书签栏</label>
            <p class="setting-desc">在新标签页中显示 Chrome 书签栏</p>
          </div>
          <div class="setting-control">
            <label class="toggle">
              <input type="checkbox" id="showBookmarkBar" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label">标题自动换行</label>
            <p class="setting-desc">开启后，长标题会自动换行显示；关闭则显示省略号</p>
          </div>
          <div class="setting-control">
            <label class="toggle">
              <input type="checkbox" id="wrapTitleText">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </section>

      <section class="section danger-zone">
        <h2>⚠️ 危险区域</h2>

        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label">清空工作区</label>
            <p class="setting-desc">删除工作区中的所有书签文件夹（此操作不可撤销）</p>
          </div>
          <div class="setting-control">
            <button id="clearWorkspace" class="btn btn-danger">清空</button>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
