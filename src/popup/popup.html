<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保存标签页</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="section">
      <h2>保存当前窗口</h2>
      <div class="input-group">
        <label for="folderName">文件夹名称（可选）</label>
        <input type="text" id="folderName" placeholder="留空使用当前时间">
      </div>
      <button id="saveBtn" class="primary-btn">
        <span class="icon">💾</span>
        保存并关闭窗口
      </button>
    </div>

    <div class="section stats">
      <h2>工作区统计</h2>
      <div class="stat-grid">
        <div class="stat-item">
          <span class="stat-value" id="folderCount">-</span>
          <span class="stat-label">文件夹</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="bookmarkCount">-</span>
          <span class="stat-label">书签</span>
        </div>
      </div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
